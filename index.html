<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, deleteDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-dka1KIvCZ1Bxk4GS3jJiSEf0hy9PrBA",
  authDomain: "thl-3cdd0.firebaseapp.com",
  projectId: "thl-3cdd0",
  storageBucket: "thl-3cdd0.firebasestorage.app",
  messagingSenderId: "621616591460",
  appId: "1:621616591460:web:0a456ea31fa07ac992a571"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.dbGetClients = async () => {
  const snap = await getDocs(collection(db, "clients"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddClient = async (client) => {
  const ref = await addDoc(collection(db, "clients"), client);
  return ref.id;
};

window.dbUpdateClient = async (id, patch) => {
  await updateDoc(doc(db, "clients", id), patch);
};

window.dbGetRecords = async (clientId) => {
  const q = query(collection(db, "records"), where("clientId", "==", clientId));
  const snap = await getDocs(q);
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddRecord = async (clientId, record) => {
  await addDoc(collection(db, "records"), { clientId, ...record });
};

window.dbGetHairChecks = async (clientId) => {
  const q = query(collection(db, "hairChecks"), where("clientId", "==", clientId));
  const snap = await getDocs(q);
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddHairCheck = async (clientId, entry) => {
  await addDoc(collection(db, "hairChecks"), { clientId, ...entry });
};

window.dbGetSettings = async () => {
  const ref = doc(db, "settings", "config");
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : {};
};

window.dbSetSettings = async (patch) => {
  const ref = doc(db, "settings", "config");
  await setDoc(ref, patch, { merge: true });
};

window.dbGetSlots = async () => {
  const snap = await getDocs(collection(db, "slots"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddSlot = async (slot) => {
  const ref = await addDoc(collection(db, "slots"), slot);
  return ref.id;
};

window.dbUpdateSlot = async (id, patch) => {
  await updateDoc(doc(db, "slots", id), patch);
};

window.dbDeleteSlot = async (id) => {
  await deleteDoc(doc(db, "slots", id));
};

window.dbGetServices = async () => {
  const snap = await getDocs(collection(db, "services"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddService = async (service) => {
  const ref = await addDoc(collection(db, "services"), service);
  return ref.id;
};

window.dbDeleteService = async (id) => {
  await deleteDoc(doc(db, "services", id));
};

window.__dbReady = true;
window.dispatchEvent(new Event("firebase-ready"));

nd cut. A lightweight root-lifting mousse and blow-drying upside down at the roots can help \u2014 this is also a great thing to bring up for your next cut."},heatDamage:{label:"Heat damage",advice:"Give hot tools a break where possible, always use heat protectant, and lower the tool temperature. A weekly deep conditioning or bond-repair treatment helps rebuild strength over time."},itchyScalp:{label:"Itchy / sensitive scalp",advice:"An itchy scalp can come from product buildup, dryness, or sensitivity to an ingredient. Try a gentle, fragrance-free shampoo for a couple weeks. If it's persistent or uncomfortable, a dermatologist can help pinpoint the cause."}};function Oo(){return Math.random().toString(36).slice(2,10)}function zi(l){return(l||"").replace(/\D/g,"").slice(-9)}async function Ny(l,t=900,e=.7){return new Promise((a,n)=>{let u=new FileReader;u.onload=i=>{let c=new Image;c.onload=()=>{let o=Math.min(1,t/c.width),r=document.createElement("canvas");r.width=c.width*o,r.height=c.height*o,r.getContext("2d").drawImage(c,0,0,r.width,r.height),a(r.toDataURL("image/jpeg",e))},c.onerror=n,c.src=i.target.result},u.onerror=n,u.readAsDataURL(l)})}function zl(){return new Promise(l=>{if(window.__dbReady)return l();window.addEventListener("firebase-ready",()=>l(),{once:!0}),setTimeout(l,8e3)})}async function dg(){await zl();try{return await window.dbGetClients()||[]}catch{return[]}}async function mg(l){return await zl(),window.dbAddClient(l)}async function rg(l,t){return await zl(),window.dbUpdateClient(l,t)}async function zy(l){await zl();try{return await window.dbGetRecords(l)||[]}catch{return[]}}async function Ey(l,t){return await zl(),window.dbAddRecord(l,t)}async function yg(l){await zl();try{return await window.dbGetHairChecks(l)||[]}catch{return[]}}async function hg(l,t){return await zl(),window.dbAddHairCheck(l,t)}async function vg(){await zl();try{return await window.dbGetSettings()||{}}catch{return{}}}async function wo(l){return await zl(),window.dbSetSettings(
