<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, deleteDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-dka1KIvCZ1Bxk4GS3jJiSEf0hy9PrBA",
  authDomain: "thl-3cdd0.firebaseapp.com",
  projectId: "thl-3cdd0",
  storageBucket: "thl-3cdd0.firebasestorage.app",
  messagingSenderId: "621616591460",
  appId: "1:621616591460:web:0a456ea31fa07ac992a571"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.dbGetClients = async () => {
  const snap = await getDocs(collection(db, "clients"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddClient = async (client) => {
  const ref = await addDoc(collection(db, "clients"), client);
  return ref.id;
};

window.dbUpdateClient = async (id, patch) => {
  await updateDoc(doc(db, "clients", id), patch);
};

window.dbGetRecords = async (clientId) => {
  const q = query(collection(db, "records"), where("clientId", "==", clientId));
  const snap = await getDocs(q);
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbGetAllRecords = async () => {
  const snap = await getDocs(collection(db, "records"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddRecord = async (clientId, record) => {
  await addDoc(collection(db, "records"), { clientId, ...record });
};

window.dbUpdateRecord = async (recordId, patch) => {
  await updateDoc(doc(db, "records", recordId), patch);
};

window.dbDeleteRecord = async (recordId) => {
  await deleteDoc(doc(db, "records", recordId));
};

window.dbGetHairChecks = async (clientId) => {
  const q = query(collection(db, "hairChecks"), where("clientId", "==", clientId));
  const snap = await getDocs(q);
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddHairCheck = async (clientId, entry) => {
  await addDoc(collection(db, "hairChecks"), { clientId, ...entry });
};

window.dbGetSettings = async () => {
  const ref = doc(db, "settings", "config");
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : {};
};

window.dbSetSettings = async (patch) => {
  const ref = doc(db, "settings", "config");
  await setDoc(ref, patch, { merge: true });
};

window.dbGetSlots = async () => {
  const snap = await getDocs(collection(db, "slots"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddSlot = async (slot) => {
  const ref = await addDoc(collection(db, "slots"), slot);
  return ref.id;
};

window.dbUpdateSlot = async (id, patch) => {
  await updateDoc(doc(db, "slots", id), patch);
};

window.dbDeleteSlot = async (id) => {
  await deleteDoc(doc(db, "slots", id));
};

window.dbGetServices = async () => {
  const snap = await getDocs(collection(db, "services"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddService = async (service) => {
  const ref = await addDoc(collection(db, "services"), service);
  return ref.id;
};

window.dbDeleteService = async (id) => {
  await deleteDoc(doc(db, "services", id));
};

window.dbDeleteClient = async (id) => {
  await deleteDoc(doc(db, "clients", id));
};

window.dbGetTrends = async () => {
  const snap = await getDocs(collection(db, "trends"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbClearAndSetTrends = async (trendsArray) => {
  const snap = await getDocs(collection(db, "trends"));
  await Promise.all(snap.docs.map((d) => deleteDoc(doc(db, "trends", d.id))));
  await Promise.all(trendsArray.map((t) => addDoc(collection(db, "trends"), t)));
};

window.__dbReady = true;
window.dispatchEvent(new Event("firebase-ready"));
</script>
