<div id="root"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import {
  getFirestore, collection, getDocs, addDoc, doc, getDoc, setDoc, updateDoc, query, where
} from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-dka1KIvCZ1Bxk4GS3jJiSEf0hy9PrBA",
  authDomain: "thl-3cdd0.firebaseapp.com",
  projectId: "thl-3cdd0",
  storageBucket: "thl-3cdd0.firebasestorage.app",
  messagingSenderId: "621616591460",
  appId: "1:621616591460:web:0a456ea31fa07ac992a571"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.dbGetClients = async () => {
  const snap = await getDocs(collection(db, "clients"));
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddClient = async (client) => {
  const ref = await addDoc(collection(db, "clients"), client);
  return ref.id;
};

window.dbUpdateClient = async (id, patch) => {
  await updateDoc(doc(db, "clients", id), patch);
};

window.dbGetRecords = async (clientId) => {
  const q = query(collection(db, "records"), where("clientId", "==", clientId));
  const snap = await getDocs(q);
  return snap.docs.map((d) => ({ id: d.id, ...d.data() }));
};

window.dbAddRecord = async (clientId, record) => {
  await addDoc(collection(db, "records"), { clientId, ...record });
};

window.dbGetHairChecks = async (clientId) => {

  const snap = await getDocs(q);

};

window.dbAddHairCheck = async (clientId, entry) => {
  await addDoc(collection(db, "hairChecks"), { clientId, ...entry });
};

window.dbGetSettings = async () => {
  const ref = doc(db, "settings", "config");
  const snap = await getDoc(ref);
  return snap.exists() ? snap.data() : {};
};

window.dbSetSettings = async (patch) => {
  const ref = doc(db, "settings", "config");
  await setDoc(ref, patch, { merge: true });
};

. A lightweight root-lifting mousse and blow-drying upside down at the roots can help \u2014 this is also a great thing to bring up for your next cut."},heatDamage:{label:"Heat damage",advice:"Give hot tools a break where possible, always use heat protectant, and lower the tool temperature. A weekly deep conditioning or bond-repair treatment helps rebuild strength over time."},itchyScalp:{label:"Itchy / sensitive scalp",advice:"An itchy scalp can come from product buildup, dryness, or sensitivity to an ingredient. Try a gentle, fragrance-free shampoo for a couple weeks. If it's persistent or uncomfortable, a dermatologist can help pinpoint the cause."}};function vy(){return Math.random().toString(36).slice(2,10)}async function hy(l,t=900,a=.7){return new Promise((e,u)=>{let n=new FileReader;n.onload=i=>{let c=new Image;c.onload=()=>{let f=Math.min(1,t/c.width),m=document.createElement("canvas");m.width=c.width*f,m.height=c.height*f,m.getContext("2d").drawImage(c,0,0,m.width,m.height),e(m.toDataURL("image/jpeg",a))},c.onerror=u,c.src=i.target.result},n.onerror=u,n.readAsDataURL(l)})}function Ut(){return new Promise(l=>{if(window.__dbReady)return l();window.addEventListener("firebase-ready",()=>l(),{once:!0}),setTimeout(l,8e3)})}async function qh(){await Ut();try{return await window.dbGetClients()||[]}catch{return[]}}async function Yh(l){return await Ut(),window.dbAddClient(l)}async function wh(l,t){return await Ut(),window.dbUpdateClient(l,t)}async function gy(l){await Ut();try{return await window.dbGetRecords(l)||[]}catch{return[]}}async function Gh(l,t){return await Ut(),window.dbAddRecord(l,t)}async function Xh(l){await Ut();try{return await window.dbGetHairChecks(l)||[]}catch{return[]}}async function Qh(l,t){return await Ut(),window.dbAddHairCheck(l,t)}async function jh(){await Ut();try{return await window.dbGetSettings()||{}}catch{return{}}}async function ry(l){return await Ut(),window.dbSetSettings(l)}var us="__STYLE_AI_ENDPOINT__";async function Zh(l){if(!us||
